<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Stat cards</title>
<link rel="stylesheet" href="_shell.css"/>
</head>
<body>
<div class="card">
  <div class="label-meta">Stat cards</div>
  <div class="grid-4" style="gap:12px">
    <div style="background:#0E1424;border:1px solid #1E2538;border-radius:12px;padding:16px">
      <div style="font-family:var(--font-mono);font-size:11px;color:#8892AB;letter-spacing:0.08em;text-transform:uppercase">Leads queued</div>
      <div style="font-family:var(--font-mono);font-size:32px;font-weight:700;color:#F0F4FF;margin-top:8px">128</div>
      <div style="display:flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:11px;color:#10B981;margin-top:4px">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m6 15 6-6 6 6"/></svg>
        +18% w/w
      </div>
    </div>
    <div style="background:#0E1424;border:1px solid #1E2538;border-radius:12px;padding:16px">
      <div style="font-family:var(--font-mono);font-size:11px;color:#8892AB;letter-spacing:0.08em;text-transform:uppercase">Pitches sent</div>
      <div style="font-family:var(--font-mono);font-size:32px;font-weight:700;color:#F0F4FF;margin-top:8px">42</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:#8892AB;margin-top:4px">11 awaiting reply</div>
    </div>
    <div style="background:#0E1424;border:1px solid #1E2538;border-radius:12px;padding:16px">
      <div style="font-family:var(--font-mono);font-size:11px;color:#8892AB;letter-spacing:0.08em;text-transform:uppercase">Reply rate</div>
      <div style="font-family:var(--font-mono);font-size:32px;font-weight:700;color:#F0F4FF;margin-top:8px">31%</div>
      <div style="display:flex;align-items:center;gap:4px;font-family:var(--font-mono);font-size:11px;color:#EF4444;margin-top:4px">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
        −4% w/w
      </div>
    </div>
    <div style="background:#0E1424;border:1px solid #1E2538;border-radius:12px;padding:16px">
      <div style="font-family:var(--font-mono);font-size:11px;color:#8892AB;letter-spacing:0.08em;text-transform:uppercase">Hours saved</div>
      <div style="font-family:var(--font-mono);font-size:32px;font-weight:700;color:#FF4D4D;margin-top:8px">26.4</div>
      <div style="font-family:var(--font-mono);font-size:11px;color:#8892AB;margin-top:4px">vs manual prospecting</div>
    </div>
  </div>
</div>
</body></html>
