<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Skeletons + empty</title>
<link rel="stylesheet" href="_shell.css"/>
<style>
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.sk{background:linear-gradient(90deg, #0E1424 0%, #131A2C 50%, #0E1424 100%);background-size:400px 100%;animation:shimmer 1.4s linear infinite;border-radius:6px}
</style></head>
<body>
<div class="card">
  <div class="label-meta">Loading skeleton · lead row</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:grid;grid-template-columns:32px 1fr 80px;gap:14px;align-items:center;padding:10px 16px;border:1px solid #1E2538;border-radius:8px;background:#0A0F1C">
      <div class="sk" style="width:32px;height:32px;border-radius:8px"></div>
      <div style="display:flex;flex-direction:column;gap:6px"><div class="sk" style="width:60%;height:12px"></div><div class="sk" style="width:40%;height:10px"></div></div>
      <div class="sk" style="width:60px;height:18px;border-radius:999px"></div>
    </div>
    <div style="display:grid;grid-template-columns:32px 1fr 80px;gap:14px;align-items:center;padding:10px 16px;border:1px solid #1E2538;border-radius:8px;background:#0A0F1C">
      <div class="sk" style="width:32px;height:32px;border-radius:8px"></div>
      <div style="display:flex;flex-direction:column;gap:6px"><div class="sk" style="width:50%;height:12px"></div><div class="sk" style="width:30%;height:10px"></div></div>
      <div class="sk" style="width:60px;height:18px;border-radius:999px"></div>
    </div>
  </div>
  <div class="label-meta">Empty state</div>
  <div style="background:#0E1424;border:1px dashed #2A3350;border-radius:12px;padding:24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4A5268" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    <div style="font-size:14px;font-weight:500;color:#F0F4FF">No leads in queue</div>
    <div style="font-size:12px;color:#8892AB;font-family:var(--font-mono)">last scout · 4h ago · 0 results above L1</div>
    <button style="margin-top:6px;background:#FF4D4D;border:none;color:#fff;font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;cursor:pointer">Run scout</button>
  </div>
</div>
</body></html>
