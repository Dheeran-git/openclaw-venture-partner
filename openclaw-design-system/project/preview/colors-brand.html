<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Brand colors</title>
<link rel="stylesheet" href="_shell.css"/>
</head>
<body>
<div class="card">
  <div class="label-meta">Brand · Coral + Teal</div>
  <div class="grid-5">
    <div class="swatch" style="background:#FF4D4D"><strong>Coral</strong><span class="hex">#FF4D4D</span></div>
    <div class="swatch" style="background:#FF6B6B"><strong>Coral soft</strong><span class="hex">#FF6B6B</span></div>
    <div class="swatch" style="background:#C73030;color:#F0F4FF"><strong>Coral deep</strong><span class="hex" style="color:#FFC5C5">#C73030</span></div>
    <div class="swatch" style="background:#7A1F1F;color:#F0F4FF"><strong>Coral darker</strong><span class="hex" style="color:#FFBFBF">#7A1F1F</span></div>
    <div class="swatch" style="background:#00E5CC"><strong style="color:#050810">Teal</strong><span class="hex" style="color:#003E37">#00E5CC</span></div>
  </div>
  <div style="font-size:13px;color:var(--fg-secondary);line-height:1.6">Coral is the only accent — used for primary CTAs, focus rings, and brand surface. Teal is reserved for "agent is working" states (live indicator, streaming pulse) — never as a generic accent.</div>
</div>
</body></html>
