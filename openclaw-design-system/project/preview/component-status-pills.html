<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Status pills</title>
<link rel="stylesheet" href="_shell.css"/>
<style>
.pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;font-weight:500;border:1px solid}
.pill .dot{width:6px;height:6px;border-radius:50%}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.pulsing{animation:pulse 1.4s ease-in-out infinite}
</style></head>
<body>
<div class="card">
  <div class="label-meta">Status pills · pitch / lead lifecycle</div>
  <div class="row" style="gap:10px">
    <span class="pill" style="color:#8892AB;background:#0E1424;border-color:#2A3350"><span class="dot" style="background:#8892AB"></span>Draft</span>
    <span class="pill" style="color:#3B82F6;background:rgba(59,130,246,0.10);border-color:rgba(59,130,246,0.30)"><span class="dot" style="background:#3B82F6"></span>Pending</span>
    <span class="pill" style="color:#10B981;background:rgba(16,185,129,0.10);border-color:rgba(16,185,129,0.30)"><span class="dot" style="background:#10B981"></span>Approved</span>
    <span class="pill" style="color:#10B981;background:rgba(16,185,129,0.10);border-color:rgba(16,185,129,0.30)"><span class="dot" style="background:#10B981"></span>Sent</span>
    <span class="pill" style="color:#EF4444;background:rgba(239,68,68,0.10);border-color:rgba(239,68,68,0.30)"><span class="dot" style="background:#EF4444"></span>Rejected</span>
    <span class="pill" style="color:#F59E0B;background:rgba(245,158,11,0.10);border-color:rgba(245,158,11,0.30)"><span class="dot" style="background:#F59E0B"></span>Snoozed</span>
  </div>
  <div class="label-meta">Live · agent working</div>
  <div class="row" style="gap:10px">
    <span class="pill" style="color:#00E5CC;background:rgba(0,229,204,0.10);border-color:rgba(0,229,204,0.30)"><span class="dot pulsing" style="background:#00E5CC"></span>Scouting</span>
    <span class="pill" style="color:#00E5CC;background:rgba(0,229,204,0.10);border-color:rgba(0,229,204,0.30)"><span class="dot pulsing" style="background:#00E5CC"></span>Drafting pitch</span>
    <span class="pill" style="color:#00E5CC;background:rgba(0,229,204,0.10);border-color:rgba(0,229,204,0.30)"><span class="dot pulsing" style="background:#00E5CC"></span>Building proof-of-value</span>
  </div>
</div>
</body></html>
