<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Pitch card</title>
<link rel="stylesheet" href="_shell.css"/>
</head>
<body>
<div class="card" style="padding:20px">
  <div class="label-meta">Pitch card · approval bar</div>
  <div style="background:#0E1424;border:1px solid #1E2538;border-radius:12px;overflow:hidden">
    <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1E2538">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-family:var(--font-mono);font-size:11px;color:#8892AB;letter-spacing:0.08em;text-transform:uppercase">pitch_a921</span>
        <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#3B82F6;background:rgba(59,130,246,0.10);border:1px solid rgba(59,130,246,0.30)"><span style="width:6px;height:6px;border-radius:50%;background:#3B82F6"></span>Pending</span>
      </div>
      <span style="font-family:var(--font-mono);font-size:11px;color:#8892AB">drafted 32s ago</span>
    </div>
    <div style="padding:16px 20px;font-size:14px;line-height:1.6;color:#F0F4FF">
      Hi Sara — saw your post about migrating the marketing site off Webflow. I rebuilt your pricing page in Next.js as a proof: <span style="font-family:var(--font-mono);color:#FF4D4D">verture-pricing-poc.vercel.app</span>. Loads 3.2× faster, same visual fidelity. 2 days. Want the full repo?
    </div>
    <div style="padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid #1E2538;background:#0A0F1C">
      <div style="display:flex;gap:8px">
        <button style="background:transparent;border:1px solid #2A3350;color:#F0F4FF;font-family:var(--font-sans);font-size:13px;padding:6px 12px;border-radius:8px;cursor:pointer">Edit</button>
        <button style="background:transparent;border:1px solid rgba(239,68,68,0.40);color:#EF4444;font-family:var(--font-sans);font-size:13px;padding:6px 12px;border-radius:8px;cursor:pointer">Reject</button>
      </div>
      <button style="background:#FF4D4D;border:none;color:#fff;font-family:var(--font-sans);font-size:13px;font-weight:500;padding:6px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px">
        Approve & send
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="m5 12 5 5L20 7"/></svg>
      </button>
    </div>
  </div>
</div>
</body></html>
