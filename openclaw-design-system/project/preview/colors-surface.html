<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Surface colors</title>
<link rel="stylesheet" href="_shell.css"/>
</head>
<body>
<div class="card">
  <div class="label-meta">Surface · Background layers + borders</div>
  <div class="grid-5">
    <div class="swatch" style="background:#050810"><strong>Base</strong><span class="hex">#050810</span></div>
    <div class="swatch" style="background:#0A0F1C"><strong>Elevated</strong><span class="hex">#0A0F1C</span></div>
    <div class="swatch" style="background:#0E1424"><strong>Card</strong><span class="hex">#0E1424</span></div>
    <div class="swatch" style="background:#131A2C"><strong>Hover</strong><span class="hex">#131A2C</span></div>
    <div class="swatch" style="background:#161E33"><strong>Selected</strong><span class="hex">#161E33</span></div>
  </div>
  <div class="grid-2">
    <div class="swatch" style="background:#0E1424;border-color:#1E2538;height:56px"><strong>Border subtle</strong><span class="hex">#1E2538 · default chrome</span></div>
    <div class="swatch" style="background:#0E1424;border:1px solid #2A3350;height:56px"><strong>Border emphasis</strong><span class="hex">#2A3350 · hover, selected</span></div>
  </div>
</div>
</body></html>
