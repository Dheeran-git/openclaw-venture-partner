<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Lead row</title>
<link rel="stylesheet" href="_shell.css"/>
<style>
.lead{display:grid;grid-template-columns:24px 32px 1fr auto auto auto;gap:14px;align-items:center;padding:12px 16px;border:1px solid #1E2538;border-radius:8px;background:#0A0F1C;cursor:pointer;transition:all 140ms}
.lead:hover{background:#131A2C;border-color:#2A3350}
.lead.selected{box-shadow:inset 0 0 0 1px #FF4D4D;border-color:transparent}
.score{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-family:var(--font-mono);font-weight:700;font-size:13px}
.title{font-size:14px;font-weight:500;color:#F0F4FF}
.meta{font-family:var(--font-mono);font-size:11px;color:#8892AB;letter-spacing:0.04em}
.cb{width:16px;height:16px;border-radius:4px;border:1px solid #2A3350;background:#0E1424}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;text-transform:uppercase;font-weight:500;border:1px solid}
</style></head>
<body>
<div class="card">
  <div class="label-meta">Lead row · default · hover · selected</div>
  <div class="lead">
    <div class="cb"></div>
    <div class="score" style="background:#10B981;color:#053026">94</div>
    <div>
      <div class="title">Senior Frontend Engineer · Vercel</div>
      <div class="meta">UPWORK · L3 · $8–12k · 4m ago</div>
    </div>
    <span class="tag" style="color:#00E5CC;background:rgba(0,229,204,0.10);border-color:rgba(0,229,204,0.30)">L3</span>
    <span class="meta">draft ready</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8892AB" stroke-width="1.5" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
  </div>
  <div class="lead" style="background:#131A2C;border-color:#2A3350">
    <div class="cb"></div>
    <div class="score" style="background:#F59E0B;color:#3B2900">58</div>
    <div>
      <div class="title">React dev · agency rebuild</div>
      <div class="meta">LINKEDIN · L2 · $4–6k · 12m ago</div>
    </div>
    <span class="tag" style="color:#FF4D4D;background:rgba(255,77,77,0.10);border-color:rgba(255,77,77,0.30)">L2</span>
    <span class="meta">drafting…</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8892AB" stroke-width="1.5" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
  </div>
  <div class="lead selected" style="background:#161E33">
    <div class="cb" style="background:#FF4D4D;border-color:#FF4D4D;display:grid;place-items:center"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="m5 12 5 5L20 7"/></svg></div>
    <div class="score" style="background:#C73030;color:#FFFFFF">22</div>
    <div>
      <div class="title">$50 fixed-price logo · low fit</div>
      <div class="meta">UPWORK · L1 · $50 · 1h ago</div>
    </div>
    <span class="tag" style="color:#8892AB;background:#0E1424;border-color:#2A3350">L1</span>
    <span class="meta">auto-rejected</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8892AB" stroke-width="1.5" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
  </div>
</div>
</body></html>
