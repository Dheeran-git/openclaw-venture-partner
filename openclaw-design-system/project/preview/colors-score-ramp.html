<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Score ramp</title>
<link rel="stylesheet" href="_shell.css"/>
</head>
<body>
<div class="card">
  <div class="label-meta">Lead score · 6 tiers</div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px">
    <div style="height:52px;background:#1E2538;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:#8892AB">
      <span style="font-size:14px;font-weight:700">—</span><span style="font-size:10px;letter-spacing:0.06em;text-transform:uppercase">archived</span>
    </div>
    <div style="height:52px;background:#7A1F1F;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:#FFC5C5">
      <span style="font-size:14px;font-weight:700">1–59</span><span style="font-size:10px;opacity:0.85">low fit</span>
    </div>
    <div style="height:52px;background:#A88F1F;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:#1A1500">
      <span style="font-size:14px;font-weight:700">60–69</span><span style="font-size:10px;opacity:0.85">amber-dim</span>
    </div>
    <div style="height:52px;background:#D6B82A;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:#2A2400">
      <span style="font-size:14px;font-weight:700">70–79</span><span style="font-size:10px;opacity:0.85">amber</span>
    </div>
    <div style="height:52px;background:#3FAE6A;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:#062719">
      <span style="font-size:14px;font-weight:700">80–89</span><span style="font-size:10px;opacity:0.85">muted green</span>
    </div>
    <div style="height:52px;background:#10B981;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:#053026">
      <span style="font-size:14px;font-weight:700">90+</span><span style="font-size:10px;opacity:0.85">bright green</span>
    </div>
  </div>
  <div class="row" style="gap:8px;margin-top:10px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:8px;background:#0E1424;border:1px solid #1E2538;border-radius:8px;padding:6px 10px">
      <span style="width:24px;height:24px;border-radius:6px;background:#10B981;color:#053026;font-family:var(--font-mono);font-weight:700;font-size:12px;display:grid;place-items:center">94</span>
      <span style="font-size:13px;color:#F0F4FF">Senior Frontend · Vercel</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;background:#0E1424;border:1px solid #1E2538;border-radius:8px;padding:6px 10px">
      <span style="width:24px;height:24px;border-radius:6px;background:#D6B82A;color:#2A2400;font-family:var(--font-mono);font-weight:700;font-size:12px;display:grid;place-items:center">72</span>
      <span style="font-size:13px;color:#F0F4FF">Design system · Series B</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;background:#0E1424;border:1px solid #1E2538;border-radius:8px;padding:6px 10px">
      <span style="width:24px;height:24px;border-radius:6px;background:#1E2538;color:#8892AB;font-family:var(--font-mono);font-weight:700;font-size:12px;display:grid;place-items:center">—</span>
      <span style="font-size:13px;color:#8892AB">Archived · manually dismissed</span>
    </div>
  </div>
</div>
</body></html>
