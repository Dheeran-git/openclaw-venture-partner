<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<title>Sidebar nav</title>
<link rel="stylesheet" href="_shell.css"/>
<style>
.nav{background:#0A0F1C;border:1px solid #1E2538;border-radius:12px;width:256px;padding:16px 12px;display:flex;flex-direction:column;gap:2px}
.nav h3{font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#4A5268;font-weight:500;padding:8px 8px 4px;margin-top:8px}
.item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:6px;font-size:13px;color:#8892AB;cursor:pointer;transition:all 140ms}
.item:hover{background:#131A2C;color:#F0F4FF}
.item.active{background:rgba(255,77,77,0.10);color:#FF4D4D}
.item .count{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:#4A5268}
.item.active .count{color:#FF4D4D}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px;border-bottom:1px solid #1E2538;margin-bottom:8px}
.brand .name{font-size:14px;font-weight:700;letter-spacing:-0.01em;color:#F0F4FF}
</style></head>
<body>
<div class="card" style="padding:16px">
  <div class="label-meta">Sidebar nav</div>
  <nav class="nav">
    <div class="brand">
      <img src="../assets/openclaw-mark-flat.svg" width="22" height="22" alt=""/>
      <div><div class="name">OpenClaw</div><div style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#8892AB">Venture Partner</div></div>
    </div>
    <div class="item active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 12 5 10l7-7 7 7 2 2"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/></svg>
      Inbox <span class="count">12</span>
    </div>
    <div class="item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="m21 21-4.3-4.3"/><circle cx="11" cy="11" r="7"/></svg>
      Scout <span class="count">running</span>
    </div>
    <div class="item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      Pitches <span class="count">42</span>
    </div>
    <div class="item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><circle cx="17" cy="7" r="3"/></svg>
      Clients <span class="count">8</span>
    </div>
    <h3>Workspace</h3>
    <div class="item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 3h18v18H3z"/><path d="M9 9h6v6H9z"/></svg>
      Templates
    </div>
    <div class="item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6h.09A1.65 1.65 0 0 0 10 3.09V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9v.09A1.65 1.65 0 0 0 20.91 10H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
      Settings
    </div>
  </nav>
</div>
</body></html>
