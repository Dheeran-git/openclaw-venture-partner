name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r --filter ./apps/* --filter ./packages/* typecheck

      - name: Lint
        run: pnpm --filter web lint
        continue-on-error: true

      - name: Vitest
        run: pnpm -r --filter @openclaw/agent --filter @openclaw/scraping --filter @openclaw/worker run test
